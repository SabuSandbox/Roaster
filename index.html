<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roaster Pro</title>

    <link rel="apple-touch-icon" href="https://i.postimg.cc/xTsM06TL/Roaster.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/xTsM06TL/Roaster.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --p-green: #32e875; --sa-orange: #ffa500; --hd-skyblue: #00e0ff;
            --absent-red: #ff3b30; --bg: #000; --card: #111; --purple: #AD00FF;
            --date-yellow: #ffff00; --holiday-blue: #5856d6;
        }

        body {
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        /* --- AUTH SCREEN STYLES --- */
        #authScreen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 99999;
        }
        .auth-input {
            background: #111; border: 1px solid #333; color: var(--hd-skyblue);
            padding: 15px; border-radius: 10px; width: 220px; text-align: center;
            font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; outline: none;
        }
        .auth-btn {
            background: var(--hd-skyblue); color: #000; border: none;
            padding: 12px 40px; border-radius: 8px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 12px;
        }

        /* --- APP CONTENT STYLES --- */
        .container { width: 95%; max-width: 400px; padding-top: 10px; padding-bottom: 60px; position: relative; }
        
        .user-profile {
            position: absolute; top: 10px; right: 0;
            text-align: right; font-size: 10px; color: #777;
            cursor: pointer; padding: 5px; background: #111; border-radius: 8px; border: 1px solid #222;
        }
        .user-profile b { color: var(--hd-skyblue); display: block; font-size: 11px; }

        .app-logo {
            width: 60px; height: 60px;
            margin: 15px auto 5px auto;
            display: block; border-radius: 14px;
            box-shadow: 0 0 15px rgba(0, 224, 255, 0.2);
        }

        h1 { 
            font-size: 32px; margin: 5px 0 10px 0; letter-spacing: 4px; font-weight: 900;
            background: linear-gradient(90deg, var(--p-green), var(--hd-skyblue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;
        }

        .stats-dashboard { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .stat-item { flex: 1; text-align: center; border-right: 1px solid #222; }
        .stat-item:last-child { border-right: none; }
        .stat-val { font-size: 18px; font-weight: 700; color: #fff; display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; text-transform: uppercase; margin-top: 2px; display: block; }

        .main-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; text-align: center; }
        .punch-btn { width: 70%; padding: 12px; border-radius: 8px; font-size: 18px; font-weight: 900; background: none; border: 2px solid var(--hd-skyblue); color: var(--hd-skyblue); text-transform: uppercase; cursor: pointer; }

        .calendar-wrapper { position: relative; background: var(--card); padding: 10px; padding-bottom: 55px; border-radius: 15px; border: 1px solid #222; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        
        .day { 
            background: #181818; border-radius: 6px; font-size: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding: 5px 2px; position: relative; cursor: pointer; min-height: 55px; color: #fff;
        }
        .day.today { border: 1px solid var(--hd-skyblue); }
        .day.highlight-leave { background: var(--date-yellow) !important; color: #000 !important; font-weight: 900; }
        .day.holiday-bg { background: rgba(88, 86, 214, 0.15); border: 1px dashed var(--holiday-blue); }

        .day-num { font-weight: 800; font-size: 11px; margin-bottom: 2px; }
        .day-hours { font-size: 7px; color: #aaa; font-weight: bold; line-height: 1; text-align: center; }
        .tag-bonus { color: var(--hd-skyblue); display: block; margin-top: 1px; }

        .bg-P { color: var(--p-green); } .bg-HD { color: var(--hd-skyblue); } 
        .bg-SA { color: var(--sa-orange); } .bg-HO { color: var(--holiday-blue); }
        .bg-A { color: var(--absent-red); }

        .purple-dot { position: absolute; top: 3px; left: 3px; width: 4px; height: 4px; background: var(--purple); border-radius: 50%; }
        .lc-indicator { position: absolute; top: 0; right: 0; width: 0; height: 0; border-left: 6px solid transparent; border-top: 6px solid var(--absent-red); }
        .manual-indicator { position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-right: 6px solid transparent; border-bottom: 6px solid var(--hd-skyblue); }
        
        .status-label { font-size: 8px; font-weight: 900; margin-top: auto; padding-top: 2px; }

        .balance-footer { 
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: #eee; font-weight: 700; 
            background: rgba(40, 40, 40, 0.9); 
            padding: 6px 15px; border-radius: 20px; 
            display: flex; align-items: center; gap: 10px; border: 1px solid #333;
            width: fit-content; white-space: nowrap;
        }

        .export-section { margin-top: 15px; }
        .export-btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 800; background: #222; border: 1px solid #444; color: #fff; cursor: pointer; text-transform: uppercase; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #151515; padding: 20px; border-radius: 12px; width: 85%; z-index: 10000; border: 1px solid #333; max-height: 85vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 9999; }
        .reg-option { display: block; width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        
        .time-picker { width: 100%; padding: 8px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="authScreen">
    <img src="https://i.postimg.cc/xTsM06TL/Roaster.png" style="width: 80px; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 224, 255, 0.3);">
    <h1 style="font-size: 24px; color: #fff; letter-spacing: 5px; margin-bottom: 5px;">ROASTER</h1>
    <p style="color: #555; font-size: 10px; margin-bottom: 25px; font-weight: 800; text-transform: uppercase;">Activation Required</p>
    
    <input type="text" id="accessKeyInput" placeholder="ENTER TOKEN" class="auth-input">
    <button onclick="verifyKey()" class="auth-btn">Activate</button>
</div>

<div class="container" id="appContent" style="display:none;">
    <div class="user-profile" onclick="editProfile()">
        <span id="pCode">Emp Code</span>
        <b id="pName">User Name</b>
    </div>

    <img src="https://i.postimg.cc/xTsM06TL/Roaster.png" alt="Roaster Logo" class="app-logo">
    <h1>ROASTER</h1>

    <div class="stats-dashboard">
        <div class="stat-item"><span class="stat-val" id="valP">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-item"><span class="stat-val" id="valHD">0</span><span class="stat-lbl">Half Day</span></div>
        <div class="stat-item"><span class="stat-val" id="valSA">0</span><span class="stat-lbl">Short Att.</span></div>
    </div>

    <div class="main-card">
        <div id="idleUI">
            <button class="punch-btn" onclick="punchIn()">Punch In</button>
            <div style="color:var(--sa-orange); font-size:10px; margin-top:10px; text-decoration:underline; cursor:pointer;" onclick="document.getElementById('mBox').style.display='block'">Manual Entry</div>
            <div id="mBox" style="display:none; margin-top:10px;">
                <input type="time" id="mTime" class="time-picker" style="width: auto;">
                <button onclick="saveManual()" style="background:var(--hd-skyblue); border:none; padding:8px 12px; border-radius:5px; font-weight:bold; color:#000;">SET</button>
            </div>
        </div>
        <div id="activeUI" style="display:none;">
            <div style="font-size:10px; text-transform:uppercase; color:#777; margin-bottom:5px;">Shift in Progress</div>
            <div id="timer" style="font-size: 36px; color: var(--hd-skyblue); font-weight:900;">00:00:00</div>
            <button onclick="finishShift()" style="margin-top:10px; background:#222; color:white; border:1px solid #444; padding:8px 20px; border-radius:20px; font-weight:bold;">PUNCH OUT</button>
        </div>
    </div>

    <div class="calendar-wrapper">
        <span style="font-size: 10px; font-weight: 700; margin-bottom: 8px; display: block;" id="progressText">PRESENT 0/0</span>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="balance-footer" id="balanceFloat">
            <span id="balanceText">SL: 0 | CL: 0 | SAR: 0</span>
            <span onclick="editBalances()" style="color:var(--hd-skyblue); cursor:pointer; font-size:14px;">✎</span>
        </div>
    </div>

    <div class="export-section">
        <button class="export-btn" onclick="exportReport()">Extract Attendance Report</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div class="modal" id="profileModal">
    <div style="margin-bottom:15px; font-weight:bold;">Edit Profile</div>
    <input type="text" id="editName" placeholder="Full Name" class="time-picker" style="margin-bottom:10px;">
    <input type="text" id="editCode" placeholder="Employee Code" class="time-picker" style="margin-bottom:20px;">
    
    <button class="reg-option" style="background:var(--p-green); color:#000;" onclick="saveProfile()">Save Profile</button>
    <button class="reg-option" style="color:var(--absent-red); border-color: #333;" onclick="lockApp()">Logout & Deactivate</button>
    <button class="reg-option" onclick="closeModals()">Cancel</button>
</div>

<div class="modal" id="regModal">
    <div id="selDate" style="font-size:10px; color:#777; margin-bottom:10px;"></div>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <div style="flex:1;"><label style="font-size:9px; color:#777;">Manual In</label><input type="time" id="regIn" class="time-picker"></div>
        <div style="flex:1;"><label style="font-size:9px; color:#777;">Manual Out</label><input type="time" id="regOut" class="time-picker"></div>
    </div>
    <button class="reg-option" style="border-color:var(--hd-skyblue); color:var(--hd-skyblue);" onclick="applyManualTime()">Update Time Only</button>
    <div id="holidayDisplay" style="background:#000; padding:10px; border-radius:8px; margin-bottom:10px; font-size:11px; border:1px dashed #444; display:none;"></div>
    <button class="reg-option" onclick="applyReg('P')">P - Mark Present</button>
    <button class="reg-option" onclick="applySAR()" id="sarBtn">SAR - Regularize</button>
    <button class="reg-option" onclick="applyReg('OD')">OD - On Duty</button>
    <button class="reg-option" onclick="applyReg('SL')">SL - Sick Leave</button>
    <button class="reg-option" onclick="applyReg('CL')">CL - Casual Leave</button>
    <button class="reg-option" onclick="applyHolidayReg()">HO - Holiday</button>
    <button class="reg-option" onclick="addRemarks()" style="color:var(--sa-orange)">Add Remarks</button>
    <button class="reg-option" style="color:var(--absent-red);" onclick="applyReg('DISCARD')">Discard Log</button>
</div>

<script>
    /* --- TOKEN CONFIGURATION --- */
    const VALID_KEYS = ["0473HO", "0447HO", "OFFICE-KEY"];

    let logs = JSON.parse(localStorage.getItem('roaster_logs') || '{}');
    let balances = JSON.parse(localStorage.getItem('roaster_balances') || '{"SL":7, "CL":7, "SAR":2}');
    let profile = JSON.parse(localStorage.getItem('roaster_profile') || '{"name":"User Name", "code":"Emp Code"}');
    let globalHolidays = JSON.parse(localStorage.getItem('roaster_holidays_map') || '{}'); 
    let activeIn = localStorage.getItem('roaster_activeIn');
    let selectedDateKey = "";

    const SHIFT_TIME_MS = 8.5 * 60 * 60 * 1000;
    const SAR_BONUS_MS = 2 * 60 * 60 * 1000;

    window.onload = () => {
        const isAuth = localStorage.getItem('roaster_auth_status');
        if (isAuth === 'true') {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            initializeApp();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appContent').style.display = 'none';
        }
    };

    function verifyKey() {
        const val = document.getElementById('accessKeyInput').value.trim();
        if (VALID_KEYS.includes(val)) {
            localStorage.setItem('roaster_auth_status', 'true');
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            initializeApp();
        } else {
            const input = document.getElementById('accessKeyInput');
            input.style.border = "1px solid var(--absent-red)";
            input.value = "";
            input.placeholder = "INVALID TOKEN";
        }
    }

    function lockApp() {
        localStorage.removeItem('roaster_auth_status');
        location.reload();
    }

    function initializeApp() {
        document.getElementById('pName').innerText = profile.name;
        document.getElementById('pCode').innerText = profile.code;
        fetchPublicHolidays('IN'); 
        renderCalendar();
        updateStats();
        if (activeIn) startTimer();
    }

    function editProfile() {
        document.getElementById('editName').value = profile.name;
        document.getElementById('editCode').value = profile.code;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('profileModal').style.display = 'block';
    }

    function saveProfile() {
        profile.name = document.getElementById('editName').value || "User Name";
        profile.code = document.getElementById('editCode').value || "Emp Code";
        localStorage.setItem('roaster_profile', JSON.stringify(profile));
        location.reload();
    }

    async function fetchPublicHolidays(countryCode) {
        const year = new Date().getFullYear();
        try {
            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/${countryCode}`);
            const data = await res.json();
            let holidayMap = {};
            data.forEach(h => { holidayMap[new Date(h.date).toDateString()] = h.name; });
            globalHolidays = holidayMap;
            localStorage.setItem('roaster_holidays_map', JSON.stringify(holidayMap));
            renderCalendar();
        } catch (e) { console.error(e); }
    }

    function punchIn() {
        activeIn = new Date().getTime();
        localStorage.setItem('roaster_activeIn', activeIn);
        localStorage.setItem('roaster_isManual', 'false');
        location.reload();
    }

    function saveManual() {
        const val = document.getElementById('mTime').value; if(!val) return;
        const [h, m] = val.split(':'); 
        const d = new Date(); d.setHours(h, m, 0, 0);
        activeIn = d.getTime(); 
        localStorage.setItem('roaster_activeIn', activeIn);
        localStorage.setItem('roaster_isManual', 'true'); 
        location.reload();
    }

    function startTimer() {
        document.getElementById('idleUI').style.display = 'none';
        document.getElementById('activeUI').style.display = 'block';
        const targetEndTime = parseInt(activeIn) + SHIFT_TIME_MS;
        setInterval(() => {
            const now = new Date().getTime();
            const remaining = targetEndTime - now;
            if (remaining <= 0) { finishShift(); return; }
            let h = Math.floor(remaining / 3600000);
            let m = Math.floor((remaining % 3600000) / 60000);
            let s = Math.floor((remaining % 60000) / 1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function finishShift() {
        let now = new Date().getTime();
        let startTime = parseInt(activeIn);
        let workedMs = now - startTime;
        let punchDate = new Date(startTime);
        let status = workedMs >= (SHIFT_TIME_MS - 2000) ? 'P' : (workedMs >= (6.25 * 3600000) ? 'SA' : 'HD');
        logs[punchDate.toDateString()] = { 
            status, punchIn: startTime, punchOut: now, 
            isManual: localStorage.getItem('roaster_isManual') === 'true', 
            isLate: punchDate.getHours() >= 10 && (punchDate.getHours() > 10 || punchDate.getMinutes() > 0)
        };
        localStorage.setItem('roaster_logs', JSON.stringify(logs));
        localStorage.removeItem('roaster_activeIn');
        location.reload();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const now = new Date(), m = now.getMonth(), y = now.getFullYear();
        const first = new Date(y, m, 1).getDay();
        const total = new Date(y, m + 1, 0).getDate();

        ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div style="font-size:9px; color:#444; text-align:center; padding-bottom:5px;">${d}</div>`);
        for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;

        for (let d = 1; d <= total; d++) {
            let date = new Date(y, m, d), key = date.toDateString();
            let log = logs[key], status = log ? log.status : '';
            if(!status && globalHolidays[key]) status = 'HO';
            if(!status && (date.getDay() === 0 || date.getDay() === 6)) status = 'WO';
            if(!status && date < new Date().setHours(0,0,0,0)) status = 'A';

            let dayEl = document.createElement('div');
            dayEl.className = `day ${key === new Date().toDateString() ? 'today' : ''}`;
            if(status === 'SL' || status === 'CL') dayEl.classList.add('highlight-leave');
            if(status === 'HO') dayEl.classList.add('holiday-bg');
            
            let worked = (log?.punchIn && log?.punchOut) ? formatDur(log.punchOut - log.punchIn) : "";
            let tag = log?.sarUsed ? "+SAR" : (status==='SL'?"+SL":status==='CL'?"+CL":"");

            dayEl.onclick = () => { selectedDateKey = key; openReg(); };
            dayEl.innerHTML = `
                ${(log?.isManual || status==='P' || status==='SAR' || status==='SL' || status==='CL') ? '<div class="purple-dot"></div>' : ''}
                <span class="day-num">${d}</span>
                <span class="day-hours">${worked} <span class="tag-bonus">${tag}</span></span>
                <span class="status-label bg-${status}">${status}</span>
                ${log?.isLate ? '<div class="lc-indicator"></div>' : ''}
                ${log?.isManual ? '<div class="manual-indicator"></div>' : ''}
            `;
            grid.appendChild(dayEl);
        }
    }

    function updateStats() {
        let s = { P: 0, HD: 0, SA: 0 };
        const now = new Date(), m = now.getMonth(), y = now.getFullYear();
        Object.keys(logs).forEach(k => {
            const d = new Date(k);
            if(d.getMonth() === m && d.getFullYear() === y && s.hasOwnProperty(logs[k].status)) s[logs[k].status]++;
        });
        let workDays = 0, total = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= total; i++) { if(new Date(y, m, i).getDay() % 6 !== 0) workDays++; }
        document.getElementById('valP').innerText = s.P;
        document.getElementById('valHD').innerText = s.HD;
        document.getElementById('valSA').innerText = s.SA;
        document.getElementById('progressText').innerText = `PRESENT ${s.P}/${workDays}`;
        document.getElementById('balanceText').innerText = `SL: ${balances.SL} | CL: ${balances.CL} | SAR: ${balances.SAR || 0}`;
    }

    function refund(log) {
        if (!log) return;
        if (log.status === 'SL') balances.SL++;
        if (log.status === 'CL') balances.CL++;
        if (log.sarUsed) { balances.SAR++; log.sarUsed = false; }
    }

    function openReg() {
        const log = logs[selectedDateKey];
        document.getElementById('selDate').innerText = selectedDateKey;
        const hName = globalHolidays[selectedDateKey] || (log?.status === 'HO' ? log.remarks : "");
        const hDisplay = document.getElementById('holidayDisplay');
        if(hName) { hDisplay.innerText = "🎉 " + hName; hDisplay.style.display = 'block'; } else { hDisplay.style.display = 'none'; }
        document.getElementById('regIn').value = log?.punchIn ? new Date(log.punchIn).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}) : "";
        document.getElementById('regOut').value = log?.punchOut ? new Date(log.punchOut).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}) : "";
        document.getElementById('sarBtn').innerText = `SAR (${balances.SAR || 0} left)`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('regModal').style.display = 'block';
    }

    function applyManualTime() {
        const inV = document.getElementById('regIn').value, outV = document.getElementById('regOut').value;
        if(!inV || !outV) return;
        const log = logs[selectedDateKey] || {};
        refund(log);
        const d = new Date(selectedDateKey);
        const pIn = new Date(d).setHours(inV.split(':')[0], inV.split(':')[1]);
        const pOut = new Date(d).setHours(outV.split(':')[0], outV.split(':')[1]);
        logs[selectedDateKey] = { ...log, punchIn: pIn, punchOut: pOut, isManual: true, status: (pOut-pIn >= SHIFT_TIME_MS-2000)?'P':(pOut-pIn>=6.25*3600000?'SA':'HD') };
        save();
    }

    function applySAR() {
        const log = logs[selectedDateKey];
        if(!log?.punchOut || (balances.SAR||0) <= 0) return;
        if((log.punchOut - log.punchIn + SAR_BONUS_MS) >= SHIFT_TIME_MS - 2000) {
            refund(log); balances.SAR--;
            logs[selectedDateKey].status = 'P'; logs[selectedDateKey].sarUsed = true;
            save();
        }
    }

    function applyHolidayReg() {
        const hName = prompt("Holiday Name:", globalHolidays[selectedDateKey] || "Public Holiday");
        if(hName === null) return;
        const log = logs[selectedDateKey] || {};
        refund(log);
        logs[selectedDateKey] = { ...log, status: 'HO', remarks: hName };
        save();
    }

    function applyReg(type) {
        let log = logs[selectedDateKey] || {};
        if(type === 'DISCARD') { 
            if(log.punchIn && !log.isManual) { alert("Actual logs protected"); return; }
            refund(log); delete logs[selectedDateKey]; 
        } else {
            refund(log);
            if((type==='SL'||type==='CL')) { if((balances[type]||0)<=0) return; balances[type]--; }
            logs[selectedDateKey] = { ...log, status: type };
        }
        save();
    }

    function save() {
        localStorage.setItem('roaster_logs', JSON.stringify(logs));
        localStorage.setItem('roaster_balances', JSON.stringify(balances));
        location.reload();
    }

    function exportReport() {
        const now = new Date(), m = now.getMonth(), y = now.getFullYear();
        const days = new Date(y, m + 1, 0).getDate();
        let csv = `Employee: ${profile.name}, Code: ${profile.code}, Report: Monthly Attendance\n`;
        csv += "Date,Punch In,Punch Out,By,Status,Regularization,Holiday,Remarks\n";
        for (let i = 1; i <= days; i++) {
            const dStr = new Date(y, m, i).toDateString();
            const log = logs[dStr];
            const isHol = globalHolidays[dStr] || (log?.status === 'HO' ? log.remarks : "");
            const row = [
                i,
                log?.punchIn ? new Date(log.punchIn).toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit'}) : "--",
                log?.punchOut ? new Date(log.punchOut).toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit'}) : "--",
                log?.isManual ? "M" : (log?.punchIn ? "B" : "--"),
                log?.status || (isHol ? "HO" : "A"),
                log?.sarUsed ? "SAR" : (log?.status==='SL'?'SL':log?.status==='CL'?'CL':""),
                isHol || "--",
                log?.remarks || ""
            ];
            csv += row.join(",") + "\n";
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Attendance_Report_${profile.name}_${m+1}_${y}.csv`;
        a.click();
    }

    function formatDur(ms) { let h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000); return `${h}h ${m}m`; }
    function editBalances() { 
        const sl = prompt("SL:", balances.SL), cl = prompt("CL:", balances.CL), sar = prompt("SAR:", balances.SAR);
        if(sl!==null) balances.SL=parseInt(sl); if(cl!==null) balances.CL=parseInt(cl); if(sar!==null) balances.SAR=parseInt(sar);
        save(); 
    }
    function addRemarks() { let r=prompt("Remarks:", logs[selectedDateKey]?.remarks||""); if(r!==null) { logs[selectedDateKey]={...logs[selectedDateKey], remarks:r}; save(); } }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(e => e.style.display='none'); }
</script>
</body>
</html>
