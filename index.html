<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Shift Tracker</title>
    <style>
        :root {
            --primary: #0a84ff; /* iOS Active Blue */
            --success-green: #34c759; /* iOS Native Vibrant Green */
            --danger-trans: rgba(255, 69, 58, 0.65); /* Bold transparent iOS Red */
            --danger-hover: rgba(255, 69, 58, 1);     /* Full bright on hover */
            --glass-bg: rgba(20, 20, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, #2e1065 0%, #0f172a 70%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3.5rem 2rem 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Countdown Area */
        .countdown-box {
            margin-bottom: 2.5rem;
        }

        #timer {
            font-size: 4.2rem;
            font-weight: 200;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
            line-height: 1;
        }

        /* Elegant End Time display */
        #endTimeText {
            font-size: 0.9rem;
            margin: 0.8rem 0 0 0;
            letter-spacing: 0.3px;
            font-weight: 400;
            color: var(--text-muted);
            display: none;
            transition: color 0.3s ease;
        }

        /* Centered Input Panel without text */
        .input-group {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 0.85rem 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center; /* Perfectly Centered */
        }

        input[type="time"] {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.4rem; /* Slightly larger style focus */
            font-weight: 500;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            text-align: center;
            -webkit-appearance: none;
            width: 100%;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
        }
        
        /* Disabled Input adjustments */
        input[type="time"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Action Buttons stack layout */
        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Dynamic Transformative Master Button */
        #actionBtn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Mode 1: Green Punch In Style */
        .btn-punch {
            background-color: var(--success-green);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-punch:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.25);
        }

        /* Mode 2: Semi-Transparent Bold Red Reset Style */
        .btn-reset {
            background: rgba(255, 69, 58, 0.06);
            color: var(--danger-trans);
            border: 1px solid rgba(255, 69, 58, 0.2);
            font-weight: 700; /* Bold */
            letter-spacing: 0.3px;
        }

        .btn-reset:hover {
            background: rgba(255, 69, 58, 0.15);
            color: var(--danger-hover);
            border-color: rgba(255, 69, 58, 0.4);
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.3);
        }

        #actionBtn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- 1. Countdown Section -->
    <div class="countdown-box">
        <div id="timer">00:00:00</div>
        <p id="endTimeText"></p>
    </div>
    
    <!-- 2. Centered Interactive Time Picker -->
    <div class="input-group">
        <input type="time" id="punchTime" required>
    </div>

    <!-- 3. Dynamic Interactive Button -->
    <div class="action-container">
        <button id="actionBtn" class="btn-punch" type="button">Punch In</button>
    </div>
</div>

<script>
    let countdownInterval;
    let isCountingDown = false;

    window.addEventListener('DOMContentLoaded', () => {
        initCurrentTime();
        
        const actionBtn = document.getElementById('actionBtn');

        // Combined Touch + Click Engine
        actionBtn.addEventListener('click', handleButtonAction);
        actionBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleButtonAction();
        }, {passive: false});
    });

    function initCurrentTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('punchTime').value = `${hours}:${minutes}`;
    }

    function handleButtonAction() {
        if (!isCountingDown) {
            startCountdown();
        } else {
            resetTracker();
        }
    }

    function startCountdown() {
        const timeInput = document.getElementById('punchTime').value;
        if (!timeInput) return;

        const [punchHours, punchMinutes] = timeInput.split(':').map(Number);

        // Evaluate 10:30 AM Rule parameters
        const isBeforeCutoff = (punchHours < 10) || (punchHours === 10 && punchMinutes < 30);
        let totalShiftHours = 8;
        let totalShiftMinutes = isBeforeCutoff ? 15 : 30;

        // Map Target End Time onto today's date structure
        const targetDate = new Date();
        targetDate.setHours(punchHours + totalShiftHours);
        targetDate.setMinutes(punchMinutes + totalShiftMinutes);
        targetDate.setSeconds(0);
        targetDate.setMilliseconds(0);

        // Render Static End Time Info
        let endHours = targetDate.getHours();
        const endMinutes = String(targetDate.getMinutes()).padStart(2, '0');
        const ampm = endHours >= 12 ? 'PM' : 'AM';
        endHours = endHours % 12 || 12;

        const endEl = document.getElementById('endTimeText');
        endEl.innerText = `Ends at ${String(endHours).padStart(2, '0')}:${endMinutes} ${ampm}`;
        endEl.style.color = "var(--text-muted)";
        endEl.style.display = "block";

        // Flip application lock variables
        isCountingDown = true;
        document.getElementById('punchTime').disabled = true; // Lock Time selector
        
        // Transform button properties to Red Reset design
        const actionBtn = document.getElementById('actionBtn');
        actionBtn.innerText = "Reset";
        actionBtn.className = "btn-reset";

        function updateTimer() {
            const now = new Date();
            const timeDifferenceInMs = targetDate - now;

            // If shift completed
            if (timeDifferenceInMs <= 0) {
                clearInterval(countdownInterval);
                const timerEl = document.getElementById('timer');
                timerEl.style.background = "none";
                timerEl.style.webkitTextFillColor = "var(--primary)";
                timerEl.innerText = "00:00:00";
                
                endEl.innerText = "Shift Completed";
                endEl.style.color = "var(--success-green)";
                return;
            }

            const hoursLeft = Math.floor(timeDifferenceInMs / (1000 * 60 * 60));
            const minutesLeft = Math.floor((timeDifferenceInMs % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((timeDifferenceInMs % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = 
                `${String(hoursLeft).padStart(2, '0')}:${String(minutesLeft).padStart(2, '0')}:${String(secondsLeft).padStart(2, '0')}`;
        }

        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
    }

    function resetTracker() {
        clearInterval(countdownInterval);
        isCountingDown = false;
        
        // Unlock Time selector
        document.getElementById('punchTime').disabled = false;
        
        // Transform button properties back to Green Punch design
        const actionBtn = document.getElementById('actionBtn');
        actionBtn.innerText = "Punch In";
        actionBtn.className = "btn-punch";

        // Reset display digits
        const timerEl = document.getElementById('timer');
        timerEl.style.background = "linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%)";
        timerEl.style.webkitBackgroundClip = "text";
        timerEl.style.backgroundClip = "text";
        timerEl.style.webkitTextFillColor = "transparent";
        timerEl.innerText = "00:00:00";
        
        const endEl = document.getElementById('endTimeText');
        endEl.innerText = "";
        endEl.style.display = "none";
        
        initCurrentTime();
    }
</script>

</body>
</html>
