<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Shift Tracker</title>
    <style>
        :root {
            --primary: #0a84ff; /* iOS Active Blue */
            --danger-trans: rgba(255, 69, 58, 0.65); /* Bold transparent iOS Red */
            --danger-hover: rgba(255, 69, 58, 1);     /* Full bright on hover */
            --glass-bg: rgba(20, 20, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --btn-dark-glass: rgba(255, 255, 255, 0.07);
            --btn-dark-glass-hover: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, #2e1065 0%, #0f172a 70%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3.5rem 2rem 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Countdown Area */
        .countdown-box {
            margin-bottom: 2.5rem;
        }

        #timer {
            font-size: 4.2rem;
            font-weight: 200;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
            line-height: 1;
        }

        /* Elegant End Time display */
        #endTimeText {
            font-size: 0.9rem;
            margin: 0.8rem 0 0 0;
            letter-spacing: 0.3px;
            font-weight: 400;
            color: var(--text-muted);
            display: none;
            transition: color 0.3s ease;
        }

        .input-group {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 0.85rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        label {
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }

        input[type="time"] {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            text-align: right;
            -webkit-appearance: none;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            margin-left: 5px;
            opacity: 0.7;
        }

        /* Action Buttons stack layout */
        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
        }

        /* Dark Glass Punch Button */
        #punchBtn {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #ffffff;
            background: var(--btn-dark-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
            display: block;
        }

        #punchBtn:hover {
            background: var(--btn-dark-glass-hover);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #punchBtn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.04);
        }

        /* Semi-Transparent Bold Red Reset Button */
        #resetBtn {
            background: transparent;
            border: none;
            color: var(--danger-trans);
            font-size: 0.95rem;
            font-weight: 700; /* Bold */
            letter-spacing: 0.3px;
            cursor: pointer;
            padding: 0.4rem 1.2rem;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            display: block;
        }

        #resetBtn:hover {
            color: var(--danger-hover);
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.3);
        }

        #resetBtn:active {
            transform: scale(0.95);
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="countdown-box">
        <div id="timer">00:00:00</div>
        <p id="endTimeText"></p>
    </div>
    
    <div class="input-group">
        <label for="punchTime">Punch Time</label>
        <input type="time" id="punchTime" required>
    </div>

    <div class="action-container">
        <button id="punchBtn" type="button">Punch In</button>
        <button id="resetBtn" type="button">Reset</button>
    </div>
</div>

<script>
    let countdownInterval;
    let remainingSeconds = 0;

    window.addEventListener('DOMContentLoaded', () => {
        initCurrentTime();
        
        const punchBtn = document.getElementById('punchBtn');
        const resetBtn = document.getElementById('resetBtn');

        punchBtn.addEventListener('click', handlePunch);
        punchBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handlePunch();
        }, {passive: false});

        resetBtn.addEventListener('click', handleReset);
        resetBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleReset();
        }, {passive: false});
    });

    function initCurrentTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('punchTime').value = `${hours}:${minutes}`;
    }

    function handlePunch() {
        clearInterval(countdownInterval);

        const timeInput = document.getElementById('punchTime').value;
        if (!timeInput) return;

        const [punchHours, punchMinutes] = timeInput.split(':').map(Number);

        // Evaluate 10:30 AM Rule
        const isBeforeCutoff = (punchHours < 10) || (punchHours === 10 && punchMinutes < 30);
        
        let totalShiftHours = 8;
        let totalShiftMinutes = isBeforeCutoff ? 15 : 30;
        
        remainingSeconds = (totalShiftHours * 3600) + (totalShiftMinutes * 60);

        // Calculate and format target over-time destination clock
        const calculatedEnd = new Date();
        calculatedEnd.setHours(punchHours + totalShiftHours);
        calculatedEnd.setMinutes(punchMinutes + totalShiftMinutes);

        let endHours = calculatedEnd.getHours();
        const endMinutes = String(calculatedEnd.getMinutes()).padStart(2, '0');
        const ampm = endHours >= 12 ? 'PM' : 'AM';
        endHours = endHours % 12;
        endHours = endHours ? endHours : 12; // Handle midnight/noon string states cleanly

        const endEl = document.getElementById('endTimeText');
        endEl.innerText = `Ends at ${String(endHours).padStart(2, '0')}:${endMinutes} ${ampm}`;
        endEl.style.color = "var(--text-muted)";
        endEl.style.display = "block";

        function updateTimer() {
            if (remainingSeconds <= 0) {
                clearInterval(countdownInterval);
                const timerEl = document.getElementById('timer');
                timerEl.style.background = "none";
                timerEl.style.webkitTextFillColor = "var(--primary)";
                timerEl.innerText = "00:00:00";
                
                endEl.innerText = "Shift Completed";
                endEl.style.color = "#34c759"; // Success Green
                return;
            }

            const hours = Math.floor(remainingSeconds / 3600);
            const minutes = Math.floor((remainingSeconds % 3600) / 60);
            const seconds = remainingSeconds % 60;

            document.getElementById('timer').innerText = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            remainingSeconds--;
        }

        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
    }

    function handleReset() {
        clearInterval(countdownInterval);
        remainingSeconds = 0;
        
        const timerEl = document.getElementById('timer');
        timerEl.style.background = "linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%)";
        timerEl.style.webkitBackgroundClip = "text";
        timerEl.style.backgroundClip = "text";
        timerEl.style.webkitTextFillColor = "transparent";
        timerEl.innerText = "00:00:00";
        
        const endEl = document.getElementById('endTimeText');
        endEl.innerText = "";
        endEl.style.display = "none";
        
        initCurrentTime();
    }
</script>

</body>
</html>
