<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Application Branding & Web App Headers -->
    <title>Mint • Shift Tracker</title>
    <meta name="apple-mobile-web-app-title" content="Mint">
    <meta name="application-name" content="Mint">
    <meta name="theme-color" content="#0f172a">

    <!-- Embedded High-Fidelity SVG App Icon & Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='mintGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300f5a0'/%3E%3Cstop offset='100%25' stop-color='%2300d9f5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M80,20 C50,20 20,40 20,80 C50,80 80,60 80,20 Z' fill='url(%23mintGrad)'/%3E%3Cpath d='M20,80 C40,55 60,45 80,20' stroke='%23ffffff' stroke-width='4' stroke-linecap='round' opacity='0.4'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23111115'/%3E%3Cdefs%3E%3ClinearGradient id='mintGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300f5a0'/%3E%3Cstop offset='100%25' stop-color='%2300d9f5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M75,25 C50,25 25,43 25,75 C50,75 75,57 75,25 Z' fill='url(%23mintGrad)'/%3E%3Cpath d='M25,75 C41,54 59,45 75,25' stroke='%23ffffff' stroke-width='3.5' stroke-linecap='round' opacity='0.35'/%3E%3C/svg%3E">

    <style>
        :root {
            --primary: #0a84ff; /* iOS Active Blue */
            --success-green: #34c759; /* iOS Native Vibrant Green */
            --danger-trans: rgba(255, 69, 58, 0.65); /* Bold transparent iOS Red */
            --danger-hover: rgba(255, 69, 58, 1);     /* Full bright on hover */
            --glass-bg: rgba(20, 20, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
            --mint-glow: #00f5a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, #064e3b 0%, #0f172a 75%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem 2rem 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Branding Header */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .brand-icon {
            width: 24px;
            height: 24px;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #ffffff 50%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Countdown Area */
        .countdown-box {
            margin-bottom: 2.5rem;
        }

        #timer {
            font-size: 4.2rem;
            font-weight: 200;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
            line-height: 1;
        }

        #endTimeText {
            font-size: 0.9rem;
            margin: 0.8rem 0 0 0;
            letter-spacing: 0.3px;
            font-weight: 400;
            color: var(--text-muted);
            display: none;
            transition: color 0.3s ease;
        }

        /* Centered Time Picker container */
        .input-group {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 0.85rem 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="time"] {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 500;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            text-align: center;
            -webkit-appearance: none;
            width: 100%;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
        }
        
        input[type="time"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #actionBtn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Green Punch Style */
        .btn-punch {
            background-color: var(--success-green);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-punch:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.25);
        }

        /* Red Reset Style */
        .btn-reset {
            background: rgba(255, 69, 58, 0.06);
            color: var(--danger-trans);
            border: 1px solid rgba(255, 69, 58, 0.2);
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .btn-reset:hover {
            background: rgba(255, 69, 58, 0.15);
            color: var(--danger-hover);
            border-color: rgba(255, 69, 58, 0.4);
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.3);
        }

        #actionBtn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- Brand Logo and Name Section -->
    <div class="brand-header">
        <svg class="brand-icon" viewBox="0 0 100 100">
            <defs>
                <linearGradient id='brandGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E
                    <stop offset='0%25' stop-color='%2300f5a0'/>
                    <stop offset='100%25' stop-color='%2300d9f5'/>
                </linearGradient>
            </defs>
            <path d='M80,20 C50,20 20,40 20,80 C50,80 80,60 80,20 Z' fill='url(#brandGrad)'/>
            <path d='M20,80 C40,55 60,45 80,20' stroke='#ffffff' stroke-width='5' stroke-linecap='round' opacity='0.4'/>
        </svg>
        <span class="brand-name">Mint</span>
    </div>

    <!-- Countdown Display -->
    <div class="countdown-box">
        <div id="timer">00:00:00</div>
        <p id="endTimeText"></p>
    </div>
    
    <!-- Centered Time Selector -->
    <div class="input-group">
        <input type="time" id="punchTime" required>
    </div>

    <!-- Action Button -->
    <div class="action-container">
        <button id="actionBtn" class="btn-punch" type="button">Punch In</button>
    </div>
</div>

<script>
    let countdownInterval;
    let isCountingDown = false;

    window.addEventListener('DOMContentLoaded', () => {
        initCurrentTime();
        
        const actionBtn = document.getElementById('actionBtn');
        actionBtn.addEventListener('click', handleButtonAction);
        actionBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleButtonAction();
        }, {passive: false});
    });

    function initCurrentTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('punchTime').value = `${hours}:${minutes}`;
    }

    function handleButtonAction() {
        if (!isCountingDown) {
            startCountdown();
        } else {
            resetTracker();
        }
    }

    function startCountdown() {
        const timeInput = document.getElementById('punchTime').value;
        if (!timeInput) return;

        const [punchHours, punchMinutes] = timeInput.split(':').map(Number);

        // Evaluate 10:30 AM Rule
        const isBeforeCutoff = (punchHours < 10) || (punchHours === 10 && punchMinutes < 30);
        let totalShiftHours = 8;
        let totalShiftMinutes = isBeforeCutoff ? 15 : 30;

        // Map Target End Time onto today's date
        const targetDate = new Date();
        targetDate.setHours(punchHours + totalShiftHours);
        targetDate.setMinutes(punchMinutes + totalShiftMinutes);
        targetDate.setSeconds(0);
        targetDate.setMilliseconds(0);

        // Format Target Output Clock Time
        let endHours = targetDate.getHours();
        const endMinutes = String(targetDate.getMinutes()).padStart(2, '0');
        const ampm = endHours >= 12 ? 'PM' : 'AM';
        endHours = endHours % 12 || 12;

        const endEl = document.getElementById('endTimeText');
        endEl.innerText = `Ends at ${String(endHours).padStart(2, '0')}:${endMinutes} ${ampm}`;
        endEl.style.color = "var(--text-muted)";
        endEl.style.display = "block";

        isCountingDown = true;
        document.getElementById('punchTime').disabled = true;
        
        const actionBtn = document.getElementById('actionBtn');
        actionBtn.innerText = "Reset";
        actionBtn.className = "btn-reset";

        function updateTimer() {
            const now = new Date();
            const timeDifferenceInMs = targetDate - now;

            if (timeDifferenceInMs <= 0) {
                clearInterval(countdownInterval);
                const timerEl = document.getElementById('timer');
                timerEl.style.background = "none";
                timerEl.style.webkitTextFillColor = "var(--success-green)";
                timerEl.innerText = "00:00:00";
                
                endEl.innerText = "Shift Completed";
                endEl.style.color = "var(--success-green)";
                return;
            }

            const hoursLeft = Math.floor(timeDifferenceInMs / (1000 * 60 * 60));
            const minutesLeft = Math.floor((timeDifferenceInMs % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((timeDifferenceInMs % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = 
                `${String(hoursLeft).padStart(2, '0')}:${String(minutesLeft).padStart(2, '0')}:${String(secondsLeft).padStart(2, '0')}`;
        }

        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
    }

    function resetTracker() {
        clearInterval(countdownInterval);
        isCountingDown = false;
        document.getElementById('punchTime').disabled = false;
        
        const actionBtn = document.getElementById('actionBtn');
        actionBtn.innerText = "Punch In";
        actionBtn.className = "btn-punch";

        const timerEl = document.getElementById('timer');
        timerEl.style.background = "linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.6) 100%)";
        timerEl.style.webkitBackgroundClip = "text";
        timerEl.style.backgroundClip = "text";
        timerEl.style.webkitTextFillColor = "transparent";
        timerEl.innerText = "00:00:00";
        
        const endEl = document.getElementById('endTimeText');
        endEl.innerText = "";
        endEl.style.display = "none";
        
        initCurrentTime();
    }
</script>

</body>
</html>
